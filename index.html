<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RISC-V I & R Simulator (Student Version)</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #f0f0f0; }
        textarea { width: 100%; height: 300px; font-size: 15px; }
        button { padding: 10px 16px; margin: 5px; font-size: 15px; }
        .panel { background: white; border: 1px solid #aaa; padding: 15px; margin: 15px 0; border-radius: 6px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
        .current { background-color: #ff0 !important; font-weight: bold; }
        pre { background: #f8f8f8; padding: 10px; overflow: auto; max-height: 300px; }
    </style>
</head>
<body>
    <h1>Simple RISC-V Simulator (I & R formats only)</h1>

    <div class="panel">
        <h2>Assembly Code Editor</h2>
        <textarea id="editor"># Simple Example
addi t0, zero, 10
addi t1, zero, 20
add t2, t0, t1
</textarea>
    </div>

    <div>
        <button onclick="assembleAndRun()">▶ Run All</button>
        <button onclick="step()">Step</button>
        <button onclick="resetSimulator()">Reset</button>
        <button onclick="clearConsole()">Clear Console</button>
    </div>

    <div class="panel">
        <h2>Program</h2>
        <pre id="program"></pre>
    </div>

    <div class="panel">
        <h2>Registers</h2>
        <table id="registers"></table>
    </div>

    <div class="panel">
        <h2>Console</h2>
        <pre id="console"></pre>
    </div>

    <div class="panel">
        <h2>Memory View</h2>
        <pre id="memory"></pre>
    </div>

    <script src="simulator.js"></script>
</body>
</html>
